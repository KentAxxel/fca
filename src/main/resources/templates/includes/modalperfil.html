<div class="modal-overlay" id="profileModal" th:fragment="profileModal">
    <div class="profile-modal">
        <div class="modal-header">
            <div>
                <h3>Perfil de usuario</h3>
                <p style="color:#666; margin-top:6px;">
                    Información de la sesión actual.
                </p>
            </div>

            <button class="close-btn" onclick="closeProfileModal()">×</button>
        </div>

        <div class="profile-box">
            <div class="profile-avatar">👤</div>
            <h4 th:text="${username}">adminfca</h4>
            <p th:text="${rol}">ADMIN</p>
        </div>

        <div class="profile-info">
            <div>
                <span>Usuario</span>
                <strong th:text="${username}">adminfca</strong>
            </div>

            <div>
                <span>Rol</span>
                <strong th:text="${rol}">ADMIN</strong>
            </div>

            <div>
                <span>Contraseña</span>
                <button type="button" class="btn-change-password" onclick="solicitarCambioContrasena()">
                    Cambiar contraseña
                </button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-green" onclick="closeProfileModal()">
                Continuar
            </button>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <button type="submit" class="btn-dark">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</div>
