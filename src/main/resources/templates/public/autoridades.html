<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoridades | FCA UNSM</title>

    <link rel="stylesheet" href="/css/public.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body data-module="autoridades">

<header class="public-header">
    <nav class="public-nav">
        <a href="/fca/inicio" class="public-logo">
            <div class="logo-icon">
                <i class="fa-solid fa-seedling"></i>
            </div>

            <div>
                <h1>FCA</h1>
                <span>UNSM</span>
            </div>
        </a>

        <a href="/fca/inicio" class="back-link">Volver al inicio</a>
    </nav>
</header>

<section class="public-hero">
    <span id="publicLabel">Gestión institucional</span>
    <h2 id="publicTitle">Autoridades</h2>
    <p id="publicDescription">
        Conoce a las autoridades de la Facultad de Ciencias Agrarias.
    </p>
</section>

<main class="public-content">
    <div class="public-toolbar">
        <input type="text"
               class="public-search"
               id="publicSearch"
               placeholder="Buscar autoridad...">

        <span class="counter-badge" id="publicCounter">
            0 registro(s)
        </span>
    </div>

    <div class="public-grid four" id="publicListContainer"></div>
</main>

<div class="modal" id="publicModal">
    <div class="modal-content">
        <button class="modal-close" id="modalClose" type="button">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div id="modalBody"></div>
    </div>
</div>

<script src="/js/public.js?v=3"></script>

</body>
</html>
